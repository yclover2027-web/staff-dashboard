<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社員台帳・家族構成 フォーム</title>    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-content">
          <h1>社員データ登録システム</h1>
        </div>
      </header>

      <main class="app-main">
        <!-- トップメニュー画面 -->
        <div id="topMenu" class="glass-form text-center">
          <h2>何をしますか？</h2>
          <p class="section-desc mb-2">ご希望の操作を選択してください。</p>
          <div class="menu-actions">
            <button id="btnNew" class="menu-btn primary-btn">
              <span class="icon">✨</span> はじめて登録する（新規）
            </button>
            <button id="btnUpdate" class="menu-btn secondary-btn">
              <span class="icon">🔄</span> 登録情報を変更する
            </button>
          </div>
        </div>

        <!-- 登録／変更フォーム -->
        <form id="registrationForm" class="glass-form" style="display: none;">
          <button type="button" id="btnBack" class="back-btn">← 戻る</button>
          
          <h2 id="formTitle" class="form-main-title">新規登録フォーム</h2>
          <input type="hidden" id="formType" name="formType" value="new">
          
          <!-- 従業員情報 -->
          <section class="form-section">
            <h2 class="section-title">
              <span class="icon">👤</span> ご本人の情報
            </h2>
            <div class="form-group">
              <label for="empName">お名前 <span class="required">必須</span></label>
              <input type="text" id="empName" name="empName" placeholder="山田 太郎" required />
            </div>
            
            <div class="form-group">
              <label for="empBirthDate">生年月日 <span class="required">必須</span></label>
              <input type="date" id="empBirthDate" name="empBirthDate" required />
            </div>
            
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="empZip">郵便番号 <span class="required">必須</span></label>
                <div class="input-with-button">
                  <input type="text" id="empZip" name="empZip" placeholder="1000001 (ハイフンなし)" pattern="\\d{7}" required />
                  <button type="button" id="empZipSearch" class="search-btn">住所検索</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label for="empAddress">住所 <span class="required">必須</span></label>
              <input type="text" id="empAddress" name="empAddress" placeholder="東京都千代田区千代田1-1" required />
            </div>
          </section>

          <!-- 緊急連絡先 -->
          <section class="form-section">
            <h2 class="section-title">
              <span class="icon">🚨</span> 緊急連絡先
            </h2>
            <p class="section-desc">万が一の際にご連絡する方の情報を入力してください。</p>

            <div class="form-row">
              <div class="form-group flex-1">
                <label for="emgName">お名前 <span class="required">必須</span></label>
                <input type="text" id="emgName" name="emgName" placeholder="山田 花子" required />
              </div>
              <div class="form-group flex-1">
                <label for="emgRelation">続柄 <span class="required">必須</span></label>
                <input type="text" id="emgRelation" name="emgRelation" placeholder="例: 妻、父 など" required />
              </div>
            </div>

            <div class="form-group">
              <label for="emgPhone">電話番号 <span class="required">必須</span></label>
              <input type="tel" id="emgPhone" name="emgPhone" placeholder="090-0000-0000" required />
            </div>

            <div class="form-row">
              <div class="form-group flex-1">
                <label for="emgZip">郵便番号 <span class="required">必須</span></label>
                <div class="input-with-button">
                  <input type="text" id="emgZip" name="emgZip" placeholder="1000001 (ハイフンなし)" pattern="\\d{7}" required />
                  <button type="button" id="emgZipSearch" class="search-btn">住所検索</button>
                </div>
              </div>
            </div>
            
            <div class="form-group">
              <label for="emgAddress">住所 <span class="required">必須</span></label>
              <input type="text" id="emgAddress" name="emgAddress" placeholder="本人の住所と同じ場合はご記入ください" required />
            </div>
          </section>

          <!-- 家族情報 -->
          <section class="form-section">
            <h2 class="section-title">
              <span class="icon">👥</span> 家族情報 (該当する方のみ)
            </h2>
            <div class="info-box">
              <p>※報告が必要な家族範囲：<br>
              <strong>本人の 0・1親等</strong>（2親等は同居のみ）、<br>
              または <strong>配偶者の 1親等</strong> までです。</p>
              <button type="button" id="btnShowFamilyTree" class="link-btn">🔍 親等早見表を見る</button>
            </div>
            
            <div id="familyContainer">
              <!-- 動的に追加される -->
            </div>

            <button type="button" id="addFamilyBtn" class="add-btn mt-1">
              <span>+</span> 対象の家族を追加する
            </button>
          </section>

          <div class="form-actions">
            <button type="submit" id="submitBtn" class="submit-btn primary-btn">
              <span id="submitText">送信する</span>
              <div class="loader" id="submitLoader" style="display: none;"></div>
            </button>
          </div>
          <div id="errorMessage" class="error-message" style="display: none;">
            <p>送信エラーが発生しました。時間をおいてもう一度お試しください。</p>
          </div>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
          <div class="success-icon">✨</div>
          <h3>受付が完了しました！</h3>
          <p>情報のご提供ありがとうございました。</p>
          <button id="btnReload" class="menu-btn secondary-btn mt-2">トップに戻る</button>
        </div>
      </main>
    </div>

    <!-- モーダル（親等早見表） -->
    <div id="familyTreeModal" class="modal">
      <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h3 class="modal-title">親等早見表</h3>
        <img src="/family-tree.png" alt="親等早見表" class="modal-img" />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
