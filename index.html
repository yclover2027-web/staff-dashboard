<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クローバースタッフ ご登録フォーム</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-content">
          <h1>🍀 クローバースタッフ<br>ご登録フォーム</h1>
        </div>
      </header>

      <main class="app-main">
        <div id="topMenu" class="glass-form text-center">
          <h2 class="soft-title">なにをしますか？</h2>
          <p class="section-desc mb-2">ご希望のボタンをえらんでくださいね。</p>
          <div class="menu-actions">
            <button id="btnNew" class="menu-btn primary-btn">
              <span class="icon">✨</span> はじめて登録する
            </button>
            <button id="btnUpdate" class="menu-btn secondary-btn">
              <span class="icon">🔄</span> 今の情報を変更する
            </button>
          </div>
        </div>

        <form id="registrationForm" class="glass-form" style="display: none;">
          <button type="button" id="btnBack" class="back-btn">← 最初の画面にもどる</button>
          
          <h2 id="formTitle" class="form-main-title">✨ 新規登録フォーム</h2>
          <input type="hidden" id="formType" name="formType" value="new">
          
          <!-- 従業員情報 -->
          <section class="form-section">
            <h2 class="section-title">
              <span class="icon">👤</span> あなたについて
            </h2>
            <div class="form-group">
              <label for="empName">お名前 <span class="req-badge required">必須</span></label>
              <input type="text" id="empName" name="empName" placeholder="（例）山田 太郎" required />
            </div>
            
            <div class="form-group">
              <label id="labelEmpBirth">生年月日 <span class="req-badge required">必須</span></label>
              <div class="date-picker-group">
                <select id="empYear" name="empYear" required></select> <span class="date-label">年</span>
                <select id="empMonth" name="empMonth" required></select> <span class="date-label">月</span>
                <select id="empDay" name="empDay" required></select> <span class="date-label">日</span>
              </div>
              <div id="empAgeDisplay" style="color: #0D9488; font-weight: 700; margin-top: 0.5rem; text-align: right; font-size: 0.95rem;"></div>
            </div>
            
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="empZip">郵便番号 <span class="req-badge required">必須</span></label>
                <div class="input-with-button">
                  <input type="text" id="empZip" name="empZip" placeholder="1000001（ハイフンなし）" pattern="^[0-9]{7}$" required />
                  <button type="button" id="empZipSearch" class="search-btn">住所をさがす</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label for="empAddress">ご住所 <span class="req-badge required">必須</span></label>
              <input type="text" id="empAddress" name="empAddress" placeholder="（例）東京都千代田区千代田1-1" required />
            </div>
          </section>

          <!-- 緊急連絡先 -->
          <section class="form-section">
            <h2 class="section-title">
              <span class="icon">🚨</span> 緊急連絡先
            </h2>
            <p class="section-desc">万が一の際にご連絡する方をおしえてください。</p>

            <div class="form-row">
              <div class="form-group flex-1">
                <label for="emgName">お名前 <span class="req-badge required">必須</span></label>
                <input type="text" id="emgName" name="emgName" placeholder="（例）山田 花子" required />
              </div>
              <div class="form-group flex-1">
                <label for="emgRelation">続き柄（関係） <span class="req-badge required">必須</span></label>
                <input type="text" id="emgRelation" name="emgRelation" placeholder="（例）妻、父 など" required />
              </div>
            </div>

            <div class="form-group">
              <label for="emgPhone">お電話番号 <span class="req-badge required">必須</span></label>
              <input type="tel" id="emgPhone" name="emgPhone" placeholder="090-0000-0000" required />
            </div>

            <div class="form-group mb-2 mt-2">
              <label class="checkbox-label" style="cursor: pointer; display: flex; align-items: center; border: 2px dashed #80CBC4; padding: 1rem; border-radius: 12px; background: #F0FDFA; transition: all 0.2s;">
                <input type="checkbox" id="emgSameAsEmp" style="transform: scale(1.4); margin-right: 0.8rem; accent-color: var(--primary);"> 
                <span style="font-weight: bold; color: #0D9488; font-size: 1.05rem;">🏠 ご自身の住所と同じにする</span>
              </label>
            </div>

            <div id="emgAddressGroup">
              <div class="form-row">
                <div class="form-group flex-1">
                  <label for="emgZip">郵便番号 <span class="req-badge required">必須</span></label>
                  <div class="input-with-button">
                    <input type="text" id="emgZip" name="emgZip" placeholder="1000001（ハイフンなし）" pattern="^[0-9]{7}$" required />
                    <button type="button" id="emgZipSearch" class="search-btn">住所をさがす</button>
                  </div>
                </div>
              </div>
              
              <div class="form-group">
                <label for="emgAddress">ご住所 <span class="req-badge required">必須</span></label>
                <input type="text" id="emgAddress" name="emgAddress" placeholder="（例）東京都千代田区千代田1-1" required />
              </div>
            </div>
          </section>

          <!-- 家族情報 -->
          <section class="form-section">
            <h2 class="section-title">
              <span class="icon">👥</span> ご家族について (当てはまる方のみ)
            </h2>
            <div class="info-box">
              <p>※報告が必要な家族範囲：<br>
              <strong>本人の 0・1親等</strong>（2親等は同居のみ）、<br>
              または <strong>配偶者の 1親等</strong> までです。</p>
              <button type="button" id="btnShowFamilyTree" class="link-btn">🔍 親等早見表を見る</button>
            </div>
            
            <div id="familyContainer">
              <!-- 動的に追加される -->
            </div>

            <button type="button" id="addFamilyBtn" class="add-btn mt-1">
              <span>+</span> 家族を追加する
            </button>
          </section>

          <div class="form-actions">
            <button type="submit" id="submitBtn" class="submit-btn primary-btn">
              <span id="submitText">この内容で送信する 🕊️</span>
              <div class="loader" id="submitLoader" style="display: none;"></div>
            </button>
          </div>
          <div id="errorMessage" class="error-message" style="display: none;">
            <p>送信に失敗しました💦 もう一度お試しください。</p>
          </div>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
          <div class="success-icon">✨</div>
          <h3>受付が完了しました！</h3>
          <p>情報のご提供ありがとうございました😊</p>
          <button id="btnReload" class="menu-btn secondary-btn mt-2">最初の画面にもどる</button>
        </div>
      </main>
    </div>

    <!-- モーダル（親等早見表） -->
    <div id="familyTreeModal" class="modal">
      <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h3 class="modal-title">親等早見表</h3>
        <img src="/family-tree.png" alt="親等早見表" class="modal-img" />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
